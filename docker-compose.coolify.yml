# Docker Compose для деплоя через Coolify.
# Coolify использует Traefik — nginx выступает как внутренний reverse proxy,
# Traefik маршрутизирует трафик на nginx.
#
# В Coolify:
# 1. Создать приложение → Docker Compose
# 2. Указать этот файл: docker-compose.coolify.yml
# 3. Задать переменные окружения (см. .env.example)
# 4. Домен привязать к сервису nginx

services:
  db:
    image: postgres:16-alpine
    volumes:
      - med-ear-postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-med_ear}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build: ./server
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-${SERVICE_FQDN_NGINX}}
      - POSTGRES_DB=${POSTGRES_DB:-med_ear}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://${SERVICE_FQDN_NGINX}}
      - AUTH_RATE_LIMIT=${AUTH_RATE_LIMIT:-5/m}
    volumes:
      - med-ear-media:/app/media
      - med-ear-static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/docs\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./patient_app/build/web:/usr/share/nginx/html:ro
      - med-ear-static:/var/www/static:ro
      - med-ear-media:/var/www/media:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  med-ear-postgres:
  med-ear-media:
  med-ear-static:
