# Docker Compose для Coolify.
# Без nginx — Traefik (Coolify) маршрутизирует напрямую на Django.
# Django раздаёт static через WhiteNoise и Flutter web app.
#
# В Coolify:
# 1. Создать приложение → Docker Compose
# 2. Указать файл: docker-compose.coolify.yml
# 3. Задать переменные в Coolify UI:
#    - DJANGO_SECRET_KEY (обязательно)
#    - POSTGRES_PASSWORD (обязательно)
#    - CORS_ALLOWED_ORIGINS (https://ваш-домен)
# 4. Домен привязать к сервису web

services:
  db:
    image: postgres:16-alpine
    volumes:
      - med-ear-postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-med_ear}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - POSTGRES_DB=${POSTGRES_DB:-med_ear}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - AUTH_RATE_LIMIT=${AUTH_RATE_LIMIT:-5/m}
      - FLUTTER_WEB_DIR=/app/flutter_web
    volumes:
      - med-ear-media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/docs\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: unless-stopped

volumes:
  med-ear-postgres:
  med-ear-media:
