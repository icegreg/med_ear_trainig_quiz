# Docker Compose для Coolify.
# Без nginx и PostgreSQL — БД создаётся отдельно в Coolify.
# Django раздаёт static через WhiteNoise и Flutter web app.
#
# В Coolify:
# 1. Создать PostgreSQL как отдельный ресурс
# 2. Создать приложение → Docker Compose, указать этот файл
# 3. Задать переменные в Coolify UI:
#    - DJANGO_SECRET_KEY (обязательно)
#    - POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_HOST, POSTGRES_PORT
#    - CORS_ALLOWED_ORIGINS (https://ваш-домен)
# 4. Домен привязать к сервису web

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - AUTH_RATE_LIMIT=${AUTH_RATE_LIMIT:-5/m}
      - FLUTTER_WEB_DIR=/app/flutter_web
    volumes:
      - med-ear-media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/docs\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: unless-stopped

volumes:
  med-ear-media:
